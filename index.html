<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메이플스토리 캐시샵 DB 대시보드</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif; }
  .label-hot { background:#ef4444; color:white; }
  .label-new { background:#10b981; color:white; }
  .label-special { background:#8b5cf6; color:white; }
  .label-best { background:#f59e0b; color:white; }
  .label-default { background:#6366f1; color:white; }
</style>
</head>
<body class="bg-slate-50 text-slate-900">
<div class="max-w-6xl mx-auto px-4 py-8">
  <header class="mb-8">
    <h1 id="title" class="text-3xl font-bold mb-2"></h1>
    <div class="flex flex-wrap gap-3 text-sm text-slate-600">
      <a id="notion-link" href="#" target="_blank" class="text-indigo-600 hover:underline">📘 Notion DB</a>
      <span id="generated-at"></span>
      <span id="generated-by"></span>
    </div>
  </header>

  <section class="mb-8">
    <h2 class="text-xl font-bold mb-3">진행 현황</h2>
    <div id="progress" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
  </section>

  <section class="mb-8">
    <h2 class="text-xl font-bold mb-3">판매 공지</h2>
    <div id="sales" class="space-y-5"></div>
  </section>

  <footer class="text-xs text-slate-400 text-center py-6">
    Generated by Claude Opus 4.7 · <a href="https://github.com/metaflow76/maple-cashshop-dashboard" class="hover:underline">GitHub</a>
  </footer>
</div>

<script>
const labelClass = (label) => {
  if (!label) return '';
  if (label === 'HOT') return 'label-hot';
  if (label === 'NEW') return 'label-new';
  if (label === 'SPECIAL' || label.includes('스페셜')) return 'label-special';
  if (label === 'BEST') return 'label-best';
  return 'label-default';
};

const statusBadge = (status) => {
  const cls = status === '판매중' ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-200 text-slate-700';
  return `<span class="inline-block px-2 py-0.5 text-xs rounded ${cls}">${status}</span>`;
};

const fmtPrice = (p, u) => {
  if (p == null) return '<span class="text-slate-400">-</span>';
  return `${p.toLocaleString()} ${u || ''}`;
};

fetch('data.json').then(r => r.json()).then(data => {
  document.getElementById('title').textContent = data.meta.title;
  document.getElementById('notion-link').href = data.meta.notion_db_url;
  document.getElementById('generated-at').textContent = `📅 ${data.meta.generated_at}`;
  document.getElementById('generated-by').textContent = `🤖 ${data.meta.generated_by}`;

  const p = data.progress;
  const stats = [
    { label: '목표 판매 공지', value: p.total_planned_sale, color: 'indigo' },
    { label: '완료 Sale', value: p.completed_sale, color: 'emerald' },
    { label: '완료 EndOfSale', value: p.completed_endofsale, color: 'amber' },
    { label: '등록 아이템', value: p.total_items_registered, color: 'rose' },
  ];
  document.getElementById('progress').innerHTML = stats.map(s => `
    <div class="bg-white rounded-lg shadow-sm p-4 border border-slate-200">
      <div class="text-xs text-slate-500 mb-1">${s.label}</div>
      <div class="text-2xl font-bold text-${s.color}-600">${s.value}</div>
    </div>`).join('');

  document.getElementById('sales').innerHTML = data.sales.map(sale => `
    <article class="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden">
      <header class="px-5 py-4 border-b border-slate-100 flex items-start justify-between gap-3">
        <div>
          <div class="flex items-center gap-2 text-xs text-slate-500 mb-1">
            <span class="font-mono">${sale.type}/${sale.id}</span>
            <span>·</span>
            <span>${sale.date}</span>
            ${statusBadge(sale.status)}
          </div>
          <h3 class="font-bold text-slate-900">${sale.title}</h3>
        </div>
        <a href="${sale.url}" target="_blank" class="text-xs text-indigo-600 hover:underline whitespace-nowrap">원문 ↗</a>
      </header>
      <div class="px-5 py-4">
        <div class="text-xs font-semibold text-slate-500 mb-2">패키지 (${sale.packages.length})</div>
        <table class="w-full text-sm">
          <thead class="text-xs text-slate-500">
            <tr class="border-b border-slate-100">
              <th class="text-left py-2 font-medium">이름</th>
              <th class="text-left py-2 font-medium">라벨</th>
              <th class="text-right py-2 font-medium">가격</th>
              <th class="text-right py-2 font-medium">구성품</th>
            </tr>
          </thead>
          <tbody>
            ${sale.packages.map(pkg => `
              <tr class="border-b border-slate-50 last:border-0">
                <td class="py-2 font-medium">${pkg.name}</td>
                <td class="py-2">${pkg.label ? `<span class="text-xs px-2 py-0.5 rounded ${labelClass(pkg.label)}">${pkg.label}</span>` : ''}</td>
                <td class="py-2 text-right font-mono text-xs">${fmtPrice(pkg.price, pkg.unit)}</td>
                <td class="py-2 text-right text-slate-600">${pkg.items_count}</td>
              </tr>`).join('')}
          </tbody>
        </table>
        ${sale.events.length ? `
          <div class="mt-4 pt-4 border-t border-slate-100">
            <div class="text-xs font-semibold text-slate-500 mb-2">이벤트 보상 (${sale.events.length})</div>
            <ul class="space-y-1 text-sm">
              ${sale.events.map(e => `<li class="flex justify-between"><span>${e.name}</span><span class="text-slate-500 text-xs">보상 ${e.reward_count}개</span></li>`).join('')}
            </ul>
          </div>` : ''}
      </div>
    </article>`).join('');
});
</script>
</body>
</html>
