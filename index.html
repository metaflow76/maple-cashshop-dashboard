<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메이플스토리 캐시샵 DB 대시보드</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif; }
  .label-hot { background:#ef4444; color:white; }
  .label-new { background:#10b981; color:white; }
  .label-special { background:#8b5cf6; color:white; }
  .label-best { background:#f59e0b; color:white; }
  .label-default { background:#6366f1; color:white; }
  details > summary { list-style: none; cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }
  details[open] .chev { transform: rotate(90deg); }
  .chev { transition: transform 0.15s ease; display: inline-block; }
  .part-badge { display:inline-block; padding:1px 6px; border-radius:4px; font-size:11px; background:#e0e7ff; color:#3730a3; }
  .gender-badge { display:inline-block; padding:1px 6px; border-radius:4px; font-size:11px; background:#f1f5f9; color:#475569; }
  mark { background:#fef08a; color:inherit; padding:0 1px; border-radius:2px; }
</style>
</head>
<body class="bg-slate-50 text-slate-900">
<div class="max-w-6xl mx-auto px-4 py-8">
  <header class="mb-6">
    <h1 id="title" class="text-3xl font-bold mb-2"></h1>
    <div class="flex flex-wrap gap-3 text-sm text-slate-600">
      <a id="notion-link" href="#" target="_blank" class="text-indigo-600 hover:underline">📘 Notion DB</a>
      <span id="generated-at"></span>
      <span id="generated-by"></span>
    </div>
  </header>

  <section class="mb-8 sticky top-0 z-20 bg-slate-50/95 backdrop-blur py-3 -mx-4 px-4 border-b border-slate-200">
    <div class="flex flex-col sm:flex-row sm:items-center gap-2">
      <div class="relative flex-1">
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">🔍</span>
        <input id="global-search" type="search" autocomplete="off"
               placeholder="제목 / 패키지명 / 아이템명 / 공지 ID 검색…"
               class="w-full pl-9 pr-9 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400" />
        <button id="search-clear" type="button"
                class="absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700 hidden px-2 text-lg leading-none"
                title="검색어 지우기">✕</button>
      </div>
      <div id="search-summary" class="text-xs text-slate-500 sm:whitespace-nowrap"></div>
    </div>
  </section>

  <section id="queue-section" class="mb-8 hidden">
    <h2 class="text-xl font-bold mb-3">📋 작업 대기열</h2>
    <div id="queue" class="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden"></div>
  </section>

  <section id="sales-section" class="mb-8">
    <div class="flex items-center justify-between mb-3">
      <h2 class="text-xl font-bold">판매 공지 <span id="sales-count" class="text-xs font-normal text-slate-500 ml-1"></span></h2>
      <div class="flex gap-2 text-xs">
        <button id="expand-all" class="px-2 py-1 bg-slate-200 hover:bg-slate-300 rounded">전체 펼치기</button>
        <button id="collapse-all" class="px-2 py-1 bg-slate-200 hover:bg-slate-300 rounded">전체 접기</button>
      </div>
    </div>
    <div id="sales" class="space-y-5"></div>
    <div id="sales-empty" class="hidden text-sm text-slate-400 italic py-6 text-center">검색 결과 없음</div>
  </section>

  <section id="endofsales-section" class="mb-8 hidden">
    <div class="flex items-center justify-between mb-3">
      <h2 class="text-xl font-bold">판매종료 공지 <span id="endofsales-count" class="text-xs font-normal text-slate-500 ml-1"></span></h2>
      <div class="flex gap-2 text-xs">
        <button id="eos-expand-all" class="px-2 py-1 bg-slate-200 hover:bg-slate-300 rounded">전체 펼치기</button>
        <button id="eos-collapse-all" class="px-2 py-1 bg-slate-200 hover:bg-slate-300 rounded">전체 접기</button>
      </div>
    </div>
    <div id="endofsales" class="space-y-5"></div>
    <div id="endofsales-empty" class="hidden text-sm text-slate-400 italic py-6 text-center">검색 결과 없음</div>
    <div id="endofsales-more" class="mt-4 text-center hidden">
      <button id="endofsales-load-more" class="px-4 py-2 bg-slate-200 hover:bg-slate-300 rounded text-sm">더 보기</button>
    </div>
  </section>

  <footer class="text-xs text-slate-400 text-center py-6">
    Generated by Claude Opus 4.7 · <a href="https://github.com/metaflow76/maple-cashshop-dashboard" class="hover:underline">GitHub</a>
  </footer>
</div>

<script>
const labelClass = (label) => {
  if (!label) return '';
  if (label === 'HOT') return 'label-hot';
  if (label === 'NEW') return 'label-new';
  if (label === 'SPECIAL' || label.includes('스페셜')) return 'label-special';
  if (label === 'BEST') return 'label-best';
  return 'label-default';
};

const statusBadge = (status) => {
  const cls = status === '판매중' ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-200 text-slate-700';
  return `<span class="inline-block px-2 py-0.5 text-xs rounded ${cls}">${status}</span>`;
};

const fmtPrice = (p, u) => {
  if (p == null) return '<span class="text-slate-400">-</span>';
  return `${p.toLocaleString()} ${u || ''}`;
};

const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({
  '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
}[c]));

let __searchRegex = null;
const setSearchRegex = (q) => {
  if (!q) { __searchRegex = null; return; }
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  __searchRegex = new RegExp(esc, 'gi');
};
const hl = (s) => {
  const safe = escapeHtml(s);
  if (!__searchRegex) return safe;
  return safe.replace(__searchRegex, m => `<mark>${m}</mark>`);
};

const itemsTable = (items) => {
  if (!items || items.length === 0) return '<div class="text-xs text-slate-400 italic py-2">구성품 없음</div>';
  return `
    <table class="w-full text-xs mt-2">
      <thead class="text-slate-500">
        <tr class="border-b border-slate-200">
          <th class="text-left py-1 w-10">#</th>
          <th class="text-left py-1">아이템명</th>
          <th class="text-left py-1 w-20">부위</th>
          <th class="text-left py-1 w-24">비고</th>
        </tr>
      </thead>
      <tbody>
        ${items.map((it, i) => `
          <tr class="border-b border-slate-50 last:border-0">
            <td class="py-1 text-slate-400">${i+1}</td>
            <td class="py-1">${hl(it.name)}</td>
            <td class="py-1"><span class="part-badge">${escapeHtml(it.part)}</span></td>
            <td class="py-1"><span class="gender-badge">${escapeHtml(it.note || '')}</span></td>
          </tr>`).join('')}
      </tbody>
    </table>`;
};

const rewardsTable = (rewards) => {
  return `
    <table class="w-full text-xs mt-2">
      <thead class="text-slate-500">
        <tr class="border-b border-slate-200">
          <th class="text-left py-1 w-10">#</th>
          <th class="text-left py-1">아이템명</th>
          <th class="text-left py-1 w-20">부위</th>
          <th class="text-left py-1">비고</th>
        </tr>
      </thead>
      <tbody>
        ${rewards.map((r, i) => `
          <tr class="border-b border-slate-50 last:border-0">
            <td class="py-1 text-slate-400">${i+1}</td>
            <td class="py-1">${hl(r.name)}</td>
            <td class="py-1"><span class="part-badge">${escapeHtml(r.part)}</span></td>
            <td class="py-1 text-slate-600">${hl(r.note || '')}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
};

const renderNoticeCard = (sale) => {
  const packages = sale.packages || [];
  const events = sale.events || [];
  const totalItems = packages.reduce((acc, pk) => acc + (pk.items?.length || 0), 0);
  const totalRewards = events.reduce((acc, e) => acc + (e.rewards?.length || 0), 0);
  return `
  <article class="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden">
    <header class="px-5 py-4 border-b border-slate-100 flex items-start justify-between gap-3">
      <div>
        <div class="flex items-center gap-2 text-xs text-slate-500 mb-1">
          <span class="font-mono">${sale.type}/${sale.id}</span>
          ${sale.date ? `<span>·</span><span>${escapeHtml(sale.date)}</span>` : ''}
          ${statusBadge(sale.status)}
          <span class="ml-2 text-slate-400">패키지 ${packages.length} · 구성품 ${totalItems} · 이벤트 보상 ${totalRewards}</span>
        </div>
        <h3 class="font-bold text-slate-900">${hl(sale.title)}</h3>
      </div>
      <a href="${sale.url}" target="_blank" class="text-xs text-indigo-600 hover:underline whitespace-nowrap">원문 ↗</a>
    </header>
    <div class="px-5 py-4">
      <div class="text-xs font-semibold text-slate-500 mb-2">📦 패키지 (${packages.length})</div>
      <div class="space-y-1">
        ${packages.map(pkg => `
          <details class="border border-slate-100 rounded">
            <summary class="px-3 py-2 hover:bg-slate-50 flex items-center gap-2">
              <span class="chev text-slate-400">▶</span>
              <span class="font-medium flex-1">${hl(pkg.name || '')}</span>
              ${pkg.label ? `<span class="text-xs px-2 py-0.5 rounded ${labelClass(pkg.label)}">${escapeHtml(pkg.label)}</span>` : ''}
              <span class="font-mono text-xs text-slate-600">${fmtPrice(pkg.price, pkg.unit)}</span>
              <span class="text-xs text-slate-500 w-16 text-right">구성품 ${pkg.items?.length || 0}</span>
            </summary>
            <div class="px-3 pb-3 pt-1 bg-slate-50">
              ${pkg.note ? `<div class="text-xs text-slate-600 mb-1">💡 ${hl(pkg.note)}</div>` : ''}
              ${itemsTable(pkg.items)}
            </div>
          </details>`).join('')}
      </div>
      ${events.length ? `
        <div class="mt-5 pt-4 border-t border-slate-100">
          <div class="text-xs font-semibold text-slate-500 mb-2">🎁 이벤트 보상 (${events.length})</div>
          <div class="space-y-1">
            ${events.map(ev => `
              <details class="border border-slate-100 rounded">
                <summary class="px-3 py-2 hover:bg-slate-50 flex items-center gap-2">
                  <span class="chev text-slate-400">▶</span>
                  <span class="font-medium flex-1">${hl(ev.name)}</span>
                  <span class="text-xs text-slate-500">보상 ${ev.rewards.length}</span>
                </summary>
                <div class="px-3 pb-3 pt-1 bg-slate-50">
                  ${rewardsTable(ev.rewards)}
                </div>
              </details>`).join('')}
          </div>
        </div>` : ''}
    </div>
  </article>`;
};

// 검색 매칭: 제목 / ID / 패키지명 / 아이템명 / 이벤트명 / 보상명
const buildMatcher = (q) => {
  if (!q) return () => true;
  const needle = q.toLowerCase();
  const inText = (s) => (s || '').toString().toLowerCase().includes(needle);
  return (sale) => {
    if (String(sale.id).toLowerCase().includes(needle)) return true;
    if (inText(sale.title)) return true;
    for (const pkg of (sale.packages || [])) {
      if (inText(pkg.name)) return true;
      if (inText(pkg.note)) return true;
      if (inText(pkg.label)) return true;
      for (const it of (pkg.items || [])) {
        if (inText(it.name) || inText(it.part) || inText(it.note)) return true;
      }
    }
    for (const ev of (sale.events || [])) {
      if (inText(ev.name)) return true;
      for (const r of (ev.rewards || [])) {
        if (inText(r.name) || inText(r.part) || inText(r.note)) return true;
      }
    }
    return false;
  };
};

fetch('data.json').then(r => r.json()).then(data => {
  document.getElementById('title').textContent = data.meta.title;
  document.getElementById('notion-link').href = data.meta.notion_db_url;
  document.getElementById('generated-at').textContent = `📅 ${data.meta.generated_at}`;
  document.getElementById('generated-by').textContent = `🤖 ${data.meta.generated_by}`;

  if (data.queue && data.queue.length) {
    document.getElementById('queue-section').classList.remove('hidden');
    document.getElementById('queue').innerHTML = `
      <table class="w-full text-sm">
        <thead class="text-xs text-slate-500 bg-slate-50">
          <tr>
            <th class="text-left px-4 py-2 font-medium w-16">#</th>
            <th class="text-left px-4 py-2 font-medium w-24">공지</th>
            <th class="text-left px-4 py-2 font-medium">제목</th>
            <th class="text-left px-4 py-2 font-medium w-24">상태</th>
          </tr>
        </thead>
        <tbody>
          ${data.queue.map((q, i) => {
            const isActive = q.status === '진행 중';
            const badgeCls = isActive ? 'bg-amber-100 text-amber-700' : 'bg-slate-100 text-slate-500';
            return `
              <tr class="border-t border-slate-100 ${isActive ? 'bg-amber-50' : ''}">
                <td class="px-4 py-2 text-slate-400">${i+1}</td>
                <td class="px-4 py-2 font-mono text-xs">${q.type}/${q.id}</td>
                <td class="px-4 py-2">${escapeHtml(q.title)}</td>
                <td class="px-4 py-2"><span class="text-xs px-2 py-0.5 rounded ${badgeCls}">${escapeHtml(q.status)}</span></td>
              </tr>`;
          }).join('')}
        </tbody>
      </table>`;
  }

  // ----- 판매 공지 -----
  const salesAll = data.sales || [];
  const salesContainer = document.getElementById('sales');
  const salesEmpty = document.getElementById('sales-empty');
  const salesCountEl = document.getElementById('sales-count');

  // ----- 판매종료 공지 -----
  const eosAll = data.endofsales || [];
  const eosSection = document.getElementById('endofsales-section');
  const eosContainer = document.getElementById('endofsales');
  const eosEmpty = document.getElementById('endofsales-empty');
  const eosCountEl = document.getElementById('endofsales-count');
  const eosMoreWrap = document.getElementById('endofsales-more');
  const eosMoreBtn = document.getElementById('endofsales-load-more');
  if (eosAll.length) eosSection.classList.remove('hidden');

  const PAGE = 20;
  let eosShown = 0;
  let eosFiltered = eosAll;

  const renderEosBatch = (reset) => {
    if (reset) { eosContainer.innerHTML = ''; eosShown = 0; }
    const next = eosFiltered.slice(eosShown, eosShown + PAGE);
    eosContainer.insertAdjacentHTML('beforeend', next.map(renderNoticeCard).join(''));
    eosShown += next.length;
    eosMoreWrap.classList.toggle('hidden', eosShown >= eosFiltered.length);
    eosEmpty.classList.toggle('hidden', eosFiltered.length > 0);
    eosCountEl.textContent = `${Math.min(eosShown, eosFiltered.length)} / ${eosFiltered.length}건`;
  };

  // ----- 검색 -----
  const searchEl = document.getElementById('global-search');
  const searchClearBtn = document.getElementById('search-clear');
  const searchSummary = document.getElementById('search-summary');

  const applySearch = () => {
    const q = searchEl.value.trim();
    setSearchRegex(q);
    const matcher = buildMatcher(q.toLowerCase());

    const salesFiltered = salesAll.filter(matcher);
    salesContainer.innerHTML = salesFiltered.map(renderNoticeCard).join('');
    salesEmpty.classList.toggle('hidden', salesFiltered.length > 0);
    salesCountEl.textContent = q
      ? `${salesFiltered.length} / ${salesAll.length}건`
      : `${salesAll.length}건`;

    eosFiltered = eosAll.filter(matcher);
    renderEosBatch(true);

    searchClearBtn.classList.toggle('hidden', q.length === 0);
    if (q) {
      searchSummary.textContent = `"${q}" → 판매 ${salesFiltered.length} · 종료 ${eosFiltered.length}`;
    } else {
      searchSummary.textContent = '';
    }
  };

  // 초기 렌더
  applySearch();

  searchEl.addEventListener('input', applySearch);
  searchClearBtn.addEventListener('click', () => {
    searchEl.value = '';
    searchEl.focus();
    applySearch();
  });
  // ESC로 검색 초기화
  searchEl.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      searchEl.value = '';
      applySearch();
    }
  });
  // Cmd/Ctrl+K 단축키로 검색창 포커스
  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
      e.preventDefault();
      searchEl.focus();
      searchEl.select();
    }
  });

  eosMoreBtn.onclick = () => renderEosBatch(false);

  document.getElementById('expand-all').onclick =
    () => document.querySelectorAll('#sales details').forEach(d => d.open = true);
  document.getElementById('collapse-all').onclick =
    () => document.querySelectorAll('#sales details').forEach(d => d.open = false);
  document.getElementById('eos-expand-all').onclick =
    () => document.querySelectorAll('#endofsales details').forEach(d => d.open = true);
  document.getElementById('eos-collapse-all').onclick =
    () => document.querySelectorAll('#endofsales details').forEach(d => d.open = false);
});
</script>
</body>
</html>
