<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메이플스토리 캐시샵 DB 대시보드</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif; }
  .label-hot { background:#ef4444; color:white; }
  .label-new { background:#10b981; color:white; }
  .label-special { background:#8b5cf6; color:white; }
  .label-best { background:#f59e0b; color:white; }
  .label-default { background:#6366f1; color:white; }
  details > summary { list-style: none; cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }
  details[open] .chev { transform: rotate(90deg); }
  .chev { transition: transform 0.15s ease; display: inline-block; }
  .part-badge { display:inline-block; padding:1px 6px; border-radius:4px; font-size:11px; background:#e0e7ff; color:#3730a3; }
  .gender-badge { display:inline-block; padding:1px 6px; border-radius:4px; font-size:11px; background:#f1f5f9; color:#475569; }
</style>
</head>
<body class="bg-slate-50 text-slate-900">
<div class="max-w-6xl mx-auto px-4 py-8">
  <header class="mb-8">
    <h1 id="title" class="text-3xl font-bold mb-2"></h1>
    <div class="flex flex-wrap gap-3 text-sm text-slate-600">
      <a id="notion-link" href="#" target="_blank" class="text-indigo-600 hover:underline">📘 Notion DB</a>
      <span id="generated-at"></span>
      <span id="generated-by"></span>
    </div>
  </header>

  <section class="mb-8">
    <h2 class="text-xl font-bold mb-3">진행 현황</h2>
    <div id="progress" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
  </section>

  <section id="current-task-section" class="mb-8 hidden">
    <h2 class="text-xl font-bold mb-3">🛠️ 진행 중 작업</h2>
    <div id="current-task" class="bg-amber-50 border border-amber-200 rounded-lg p-4"></div>
  </section>

  <section id="queue-section" class="mb-8 hidden">
    <h2 class="text-xl font-bold mb-3">📋 작업 대기열</h2>
    <div id="queue" class="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden"></div>
  </section>

  <section id="completed-section" class="mb-8 hidden">
    <h2 class="text-xl font-bold mb-3">✅ 완료 이력</h2>
    <div id="completed" class="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden"></div>
  </section>

  <section class="mb-8">
    <div class="flex items-center justify-between mb-3">
      <h2 class="text-xl font-bold">판매 공지</h2>
      <div class="flex gap-2 text-xs">
        <button id="expand-all" class="px-2 py-1 bg-slate-200 hover:bg-slate-300 rounded">전체 펼치기</button>
        <button id="collapse-all" class="px-2 py-1 bg-slate-200 hover:bg-slate-300 rounded">전체 접기</button>
      </div>
    </div>
    <div id="sales" class="space-y-5"></div>
  </section>

  <footer class="text-xs text-slate-400 text-center py-6">
    Generated by Claude Opus 4.7 · <a href="https://github.com/metaflow76/maple-cashshop-dashboard" class="hover:underline">GitHub</a>
  </footer>
</div>

<script>
const labelClass = (label) => {
  if (!label) return '';
  if (label === 'HOT') return 'label-hot';
  if (label === 'NEW') return 'label-new';
  if (label === 'SPECIAL' || label.includes('스페셜')) return 'label-special';
  if (label === 'BEST') return 'label-best';
  return 'label-default';
};

const statusBadge = (status) => {
  const cls = status === '판매중' ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-200 text-slate-700';
  return `<span class="inline-block px-2 py-0.5 text-xs rounded ${cls}">${status}</span>`;
};

const fmtPrice = (p, u) => {
  if (p == null) return '<span class="text-slate-400">-</span>';
  return `${p.toLocaleString()} ${u || ''}`;
};

const itemsTable = (items) => {
  if (!items || items.length === 0) return '<div class="text-xs text-slate-400 italic py-2">구성품 없음</div>';
  return `
    <table class="w-full text-xs mt-2">
      <thead class="text-slate-500">
        <tr class="border-b border-slate-200">
          <th class="text-left py-1 w-10">#</th>
          <th class="text-left py-1">아이템명</th>
          <th class="text-left py-1 w-20">부위</th>
          <th class="text-left py-1 w-24">비고</th>
        </tr>
      </thead>
      <tbody>
        ${items.map((it, i) => `
          <tr class="border-b border-slate-50 last:border-0">
            <td class="py-1 text-slate-400">${i+1}</td>
            <td class="py-1">${it.name}</td>
            <td class="py-1"><span class="part-badge">${it.part}</span></td>
            <td class="py-1"><span class="gender-badge">${it.note || ''}</span></td>
          </tr>`).join('')}
      </tbody>
    </table>`;
};

const renderOcrBlock = (ct, lastPreview) => {
  const own = ct.ocr_results;
  const preview = (!own && lastPreview) ? lastPreview : null;
  const data = own || preview;
  if (!data) return '';
  const isOwn = !!own;
  const headerTag = isOwn
    ? '<span class="text-xs px-2 py-0.5 rounded bg-emerald-100 text-emerald-700">판독 완료</span>'
    : `<span class="text-xs px-2 py-0.5 rounded bg-slate-100 text-slate-600">직전 기록 · ${preview ? `Sale/${preview.id}` : ''}</span>`;
  const cats = (data.categories || []).map(cat => `
    <div class="mt-2">
      <div class="text-sm font-semibold text-slate-800 mb-1">${cat.name}</div>
      ${(cat.subcategories || []).map(sc => `
        <div class="ml-2 mb-1">
          <div class="text-xs font-medium text-slate-600 mb-1">${sc.name}</div>
          <div class="flex flex-wrap gap-1">
            ${(sc.items || []).map(it => `<span class="text-xs px-2 py-0.5 bg-white border border-slate-200 rounded">${it}</span>`).join('')}
          </div>
        </div>`).join('')}
    </div>`).join('');
  return `
    <div class="mt-5 pt-4 border-t border-amber-200">
      <details class="bg-white rounded border border-slate-200">
        <summary class="px-3 py-2 hover:bg-slate-50 flex items-center gap-2">
          <span class="chev text-slate-400">▶</span>
          <span class="font-semibold flex-1">🔍 OCR 판독 결과${data.title ? ` · ${data.title}` : ''}</span>
          ${headerTag}
        </summary>
        <div class="px-3 pb-3 pt-1">
          ${data.summary ? `<div class="text-xs text-slate-600 mb-2">${data.summary}</div>` : ''}
          ${cats}
        </div>
      </details>
    </div>`;
};

const rewardsTable = (rewards) => {
  return `
    <table class="w-full text-xs mt-2">
      <thead class="text-slate-500">
        <tr class="border-b border-slate-200">
          <th class="text-left py-1 w-10">#</th>
          <th class="text-left py-1">아이템명</th>
          <th class="text-left py-1 w-20">부위</th>
          <th class="text-left py-1">비고</th>
        </tr>
      </thead>
      <tbody>
        ${rewards.map((r, i) => `
          <tr class="border-b border-slate-50 last:border-0">
            <td class="py-1 text-slate-400">${i+1}</td>
            <td class="py-1">${r.name}</td>
            <td class="py-1"><span class="part-badge">${r.part}</span></td>
            <td class="py-1 text-slate-600">${r.note || ''}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
};

fetch('data.json').then(r => r.json()).then(data => {
  document.getElementById('title').textContent = data.meta.title;
  document.getElementById('notion-link').href = data.meta.notion_db_url;
  document.getElementById('generated-at').textContent = `📅 ${data.meta.generated_at}`;
  document.getElementById('generated-by').textContent = `🤖 ${data.meta.generated_by}`;

  const p = data.progress;
  const stats = [
    { label: '목표 판매 공지', value: p.total_planned_sale, color: 'indigo' },
    { label: '완료 Sale', value: p.completed_sale, color: 'emerald' },
    { label: '완료 EndOfSale', value: p.completed_endofsale, color: 'amber' },
    { label: '등록 아이템', value: p.total_items_registered, color: 'rose' },
  ];
  document.getElementById('progress').innerHTML = stats.map(s => `
    <div class="bg-white rounded-lg shadow-sm p-4 border border-slate-200">
      <div class="text-xs text-slate-500 mb-1">${s.label}</div>
      <div class="text-2xl font-bold text-${s.color}-600">${s.value}</div>
    </div>`).join('');

  if (data.current_task) {
    const ct = data.current_task;
    document.getElementById('current-task-section').classList.remove('hidden');
    const steps = ct.steps || [];
    const doneCnt = steps.filter(s => s.status === 'done').length;
    const totalCnt = steps.length;
    const pct = totalCnt ? Math.round(doneCnt / totalCnt * 100) : 0;
    const stepIcon = (status) => {
      if (status === 'done') return '<span class="inline-flex items-center justify-center w-5 h-5 rounded-full bg-emerald-500 text-white text-xs">✓</span>';
      if (status === 'in_progress') return '<span class="inline-flex items-center justify-center w-5 h-5 rounded-full bg-amber-400 text-white text-xs animate-pulse">⋯</span>';
      return '<span class="inline-flex items-center justify-center w-5 h-5 rounded-full border-2 border-slate-300 text-slate-400 text-xs">○</span>';
    };
    const stepTextCls = (status) => {
      if (status === 'done') return 'text-slate-500 line-through';
      if (status === 'in_progress') return 'text-slate-900 font-semibold';
      return 'text-slate-500';
    };
    document.getElementById('current-task').innerHTML = `
      <div class="flex items-start justify-between gap-3 mb-4">
        <div class="flex-1">
          <div class="flex items-center gap-2 text-xs text-amber-700 mb-1">
            <span class="font-mono">${ct.type}/${ct.id}</span>
            <span>·</span>
            <span class="inline-block px-2 py-0.5 rounded bg-amber-200 text-amber-900 font-semibold">${ct.status}</span>
            <span class="animate-pulse">⏳</span>
          </div>
          <div class="font-bold text-slate-900">${ct.title}</div>
        </div>
        <a href="${ct.url}" target="_blank" class="text-xs text-indigo-600 hover:underline whitespace-nowrap">원문 ↗</a>
      </div>
      ${steps.length ? `
      <div class="mb-3">
        <div class="flex items-center justify-between text-xs text-slate-600 mb-1">
          <span>진행률</span>
          <span class="font-mono">${doneCnt}/${totalCnt} · ${pct}%</span>
        </div>
        <div class="w-full bg-slate-200 rounded-full h-2 overflow-hidden">
          <div class="bg-emerald-500 h-2 transition-all" style="width:${pct}%"></div>
        </div>
      </div>
      <ul class="space-y-2 mt-4">
        ${steps.map((s, i) => `
          <li class="flex items-center gap-3">
            ${stepIcon(s.status)}
            <span class="text-xs text-slate-400 w-6">${String(i+1).padStart(2, '0')}</span>
            <span class="text-sm ${stepTextCls(s.status)}">${s.name}</span>
          </li>`).join('')}
      </ul>` : ''}
      ${renderOcrBlock(ct, data.last_ocr_preview)}`;
  }

  if (data.completed && data.completed.length) {
    document.getElementById('completed-section').classList.remove('hidden');
    document.getElementById('completed').innerHTML = `
      <table class="w-full text-sm">
        <thead class="text-xs text-slate-500 bg-slate-50">
          <tr>
            <th class="text-left px-4 py-2 font-medium w-16">#</th>
            <th class="text-left px-4 py-2 font-medium w-24">공지</th>
            <th class="text-left px-4 py-2 font-medium">제목</th>
            <th class="text-right px-4 py-2 font-medium w-24">아이템</th>
            <th class="text-left px-4 py-2 font-medium w-28">완료일</th>
          </tr>
        </thead>
        <tbody>
          ${data.completed.map((c, i) => `
            <tr class="border-t border-slate-100">
              <td class="px-4 py-2 text-emerald-600">✓</td>
              <td class="px-4 py-2 font-mono text-xs">${c.type}/${c.id}</td>
              <td class="px-4 py-2">${c.title}</td>
              <td class="px-4 py-2 text-right font-mono text-xs text-slate-600">${c.items}</td>
              <td class="px-4 py-2 text-xs text-slate-500">${c.completed_at}</td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  }

  if (data.queue && data.queue.length) {
    document.getElementById('queue-section').classList.remove('hidden');
    document.getElementById('queue').innerHTML = `
      <table class="w-full text-sm">
        <thead class="text-xs text-slate-500 bg-slate-50">
          <tr>
            <th class="text-left px-4 py-2 font-medium w-16">#</th>
            <th class="text-left px-4 py-2 font-medium w-24">공지</th>
            <th class="text-left px-4 py-2 font-medium">제목</th>
            <th class="text-left px-4 py-2 font-medium w-24">상태</th>
          </tr>
        </thead>
        <tbody>
          ${data.queue.map((q, i) => {
            const isActive = q.status === '진행 중';
            const badgeCls = isActive ? 'bg-amber-100 text-amber-700' : 'bg-slate-100 text-slate-500';
            return `
              <tr class="border-t border-slate-100 ${isActive ? 'bg-amber-50' : ''}">
                <td class="px-4 py-2 text-slate-400">${i+1}</td>
                <td class="px-4 py-2 font-mono text-xs">${q.type}/${q.id}</td>
                <td class="px-4 py-2">${q.title}</td>
                <td class="px-4 py-2"><span class="text-xs px-2 py-0.5 rounded ${badgeCls}">${q.status}</span></td>
              </tr>`;
          }).join('')}
        </tbody>
      </table>`;
  }

  document.getElementById('sales').innerHTML = data.sales.map(sale => {
    const totalItems = sale.packages.reduce((acc, pk) => acc + (pk.items?.length || 0), 0);
    const totalRewards = (sale.events || []).reduce((acc, e) => acc + (e.rewards?.length || 0), 0);
    return `
    <article class="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden">
      <header class="px-5 py-4 border-b border-slate-100 flex items-start justify-between gap-3">
        <div>
          <div class="flex items-center gap-2 text-xs text-slate-500 mb-1">
            <span class="font-mono">${sale.type}/${sale.id}</span>
            <span>·</span>
            <span>${sale.date}</span>
            ${statusBadge(sale.status)}
            <span class="ml-2 text-slate-400">패키지 ${sale.packages.length} · 구성품 ${totalItems} · 이벤트 보상 ${totalRewards}</span>
          </div>
          <h3 class="font-bold text-slate-900">${sale.title}</h3>
        </div>
        <a href="${sale.url}" target="_blank" class="text-xs text-indigo-600 hover:underline whitespace-nowrap">원문 ↗</a>
      </header>
      <div class="px-5 py-4">
        <div class="text-xs font-semibold text-slate-500 mb-2">📦 패키지 (${sale.packages.length})</div>
        <div class="space-y-1">
          ${sale.packages.map(pkg => `
            <details class="border border-slate-100 rounded">
              <summary class="px-3 py-2 hover:bg-slate-50 flex items-center gap-2">
                <span class="chev text-slate-400">▶</span>
                <span class="font-medium flex-1">${pkg.name}</span>
                ${pkg.label ? `<span class="text-xs px-2 py-0.5 rounded ${labelClass(pkg.label)}">${pkg.label}</span>` : ''}
                <span class="font-mono text-xs text-slate-600">${fmtPrice(pkg.price, pkg.unit)}</span>
                <span class="text-xs text-slate-500 w-16 text-right">구성품 ${pkg.items?.length || 0}</span>
              </summary>
              <div class="px-3 pb-3 pt-1 bg-slate-50">
                ${pkg.note ? `<div class="text-xs text-slate-600 mb-1">💡 ${pkg.note}</div>` : ''}
                ${itemsTable(pkg.items)}
              </div>
            </details>`).join('')}
        </div>
        ${sale.events.length ? `
          <div class="mt-5 pt-4 border-t border-slate-100">
            <div class="text-xs font-semibold text-slate-500 mb-2">🎁 이벤트 보상 (${sale.events.length})</div>
            <div class="space-y-1">
              ${sale.events.map(ev => `
                <details class="border border-slate-100 rounded">
                  <summary class="px-3 py-2 hover:bg-slate-50 flex items-center gap-2">
                    <span class="chev text-slate-400">▶</span>
                    <span class="font-medium flex-1">${ev.name}</span>
                    <span class="text-xs text-slate-500">보상 ${ev.rewards.length}</span>
                  </summary>
                  <div class="px-3 pb-3 pt-1 bg-slate-50">
                    ${rewardsTable(ev.rewards)}
                  </div>
                </details>`).join('')}
            </div>
          </div>` : ''}
      </div>
    </article>`;
  }).join('');

  const allDetails = () => document.querySelectorAll('#sales details');
  document.getElementById('expand-all').onclick = () => allDetails().forEach(d => d.open = true);
  document.getElementById('collapse-all').onclick = () => allDetails().forEach(d => d.open = false);
});
</script>
</body>
</html>
